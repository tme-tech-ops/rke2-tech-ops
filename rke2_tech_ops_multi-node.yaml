tosca_definitions_version: dell_1_1

description: >
  This blueprint creates a Virtual Machine on a NativeEdge Endpoint and provides the VM login details.

imports:
  - dell/types/types.yaml
  - multi-node/base_definitions.yaml
  - multi-node/deploy_inputs.yaml
  - multi-node/capabilities.yaml
  - multi-node/vm/scale_definitions.yaml
  - multi-node/vm/profile_inputs.yaml
  - multi-node/vm/cp_1_inputs.yaml
  - multi-node/vm/cp_2_inputs.yaml
  - multi-node/vm/cp_3_inputs.yaml
  - multi-node/vm/ag_1_inputs.yaml
  - multi-node/vm/ag_2_inputs.yaml
  - multi-node/vm/ag_3_inputs.yaml
  - multi-node/vm/ag_4_inputs.yaml
  - multi-node/vm/ag_5_inputs.yaml
  - multi-node/vm/ag_6_inputs.yaml

input_groups:
  basic_deploy:
    display_label: Basic Deployment Configuration
    collapsible: true
    index: 0
    inputs:
      - rke2_version
      - number_of_control_plane
      - number_of_agent_nodes
      - edge_os_image_secret
      - os_type
      - cp_1_vm_user_name
      - cp_1_vm_password
      - install_ingress
      - install_servicelb
      - install_local_path_provisioner
      - local_path_provisioner_version
      - install_dns_utility
      - tls_san
      - use_registry
      - registry_secret
      - registry_url
      - push_images

  adv_deploy:
    display_label: Advanced Deployment Configuration
    collapsible: true
    index: 1
    inputs:
      - cni_type
      - cluster_cidr
      - service_cidr
      - max_pods
      - rke2_data
      - kubelet_data
      - pvc_data
      - offline_mode
      - offline_binary_secret
      - enable_cis
      - utility_blueprint_id
      - script_url
      - hide_log_output
      - debug
      - sa_namespace

  control_plane_profile:
    display_label: Control Plane Profile
    collapsible: true
    index: 2
    inputs:
      - control_plane_taint
      - cp_vcpus
      - cp_memory_size
      - cp_os_disk_size
      - cp_disk_controller

  first_control_plane:
    display_label: First Control Plane Details
    collapsible: true
    index: 3
    inputs:
