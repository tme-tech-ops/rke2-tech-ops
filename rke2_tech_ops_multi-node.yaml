      - cp_1_hostname
      - cp_1_disk_wrapper
      - cp_1_vnic_0_segment_name
      - cp_1_use_dhcp
      - cp_1_static_ip
      - cp_1_use_gateway
      - cp_1_gateway
      - cp_1_use_dns
      - cp_1_dns
      - cp_1_add_disks
      - cp_1_additional_disks
      - cp_1_add_nics
      - cp_1_vm_add_nics
      - cp_1_use_passthrough
      - cp_1_usb_wrapper
      - cp_1_gpu_wrapper
      - cp_1_pcie_wrapper
      - cp_1_video
      - cp_1_serial_port_wrapper

  add_control_plane:
    display_label: Additional Control Plane Details
    collapsible: true
    index: 4
