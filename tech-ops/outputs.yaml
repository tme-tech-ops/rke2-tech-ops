capabilities:

  rke2_service_running:
    description: RKE2 service running status
    value: { get_attribute: [ env_postcheck, capabilities, rke2_running ] }

  rke2_api_url:
    description: RKE2 Kubernetes API server URL
    value: { get_attribute: [ env_postcheck, capabilities, rke2_api_url ] }

  rke2_node_status:
    description: RKE2 cluster node status
    value: { get_attribute: [ env_postcheck, capabilities, rke2_node_status ] }

  rke2_join_token:
    description: RKE2 cluster join token for adding nodes
    value: { get_attribute: [ env_postcheck, capabilities, rke2_join_token ] }

  rke2_kubeconfig:
    description: Path to the RKE2 kubeconfig file
    value: { get_attribute: [ env_postcheck, capabilities, rke2_kubeconfig ] }

  offline_package_name:
    description: Name of the offline package (save operation)
    value: { get_attribute: [ env_postcheck, capabilities, offline_package_name ] }

  offline_package_uploaded:
    description: Whether offline package was uploaded
    value: { get_attribute: [ env_postcheck, capabilities, offline_package_uploaded ] }

  offline_package_url:
    description: URL where offline package was uploaded
    value: { get_attribute: [ env_postcheck, capabilities, offline_package_url ] }
