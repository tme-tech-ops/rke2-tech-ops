plugins:

  fabric:
    executor: central_deployment_agent
    package_name: fabric-plugin
    package_version: '3.3.2.0'

# Example node_templates demonstrating all fabric-plugin operations from tasks.py
# Each operation shows common usage patterns and important considerations

node_templates:

  # Example 1: run_script operation - Most commonly used
  # Executes a script file on the remote host with optional environment variables
  script_execution_example:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            script_path: scripts/my_script.sh  # Path relative to blueprint resources
            fabric_env:
              host_string: { get_input: host_ip }
              user: { get_input: ssh_user }
              key: { get_secret: ssh_private_key }
              port: 22
              # Optional: shell_env for environment variables
              shell_env:
                MY_VAR: "value"
                PATH: "/usr/local/bin:$PATH"
            # Optional: process configuration for advanced control
            process:
              env:
                SCRIPT_VAR: "script_specific_value"
              # base_dir: .  # Override temp directory (default: uses temp dir)
              # cwd: /custom/working/directory  # Custom working directory
              # args: ["--arg1", "--arg2"]  # Script arguments
              # command_prefix: "python"  # Prefix command (e.g., python script.py)
            proxy_settings:
              disable: false  # Set to true to disable proxy
              # auto_resolve: true  # Auto-resolve proxy settings
            # Optional: hide_output controls visibility
            # hide_output: ["stdout"]  # Hide stdout only
            # hide_output: ["stderr"]  # Hide stderr only  
            # hide_output: ["both"]    # Hide both
            # use_sudo: false  # Set to true to run with sudo privileges

  # Example 2: run_commands operation - Execute multiple commands in sequence
  # Runs a list of shell commands, useful for simple operations
  commands_execution_example:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            commands:
              - "echo 'First command'"
              - "ls -la /tmp"
              - "systemctl status nginx"
            fabric_env:
              host_string: { get_input: host_ip }
              user: { get_input: ssh_user }
              key: { get_secret: ssh_private_key }
              port: 22
              # shell_env applies to ALL commands
              shell_env:
                MY_VAR: "global_value"
            # use_sudo: true  # Run all commands with sudo
            # hide_output: ["both"]  # Hide all output
            proxy_settings:
              disable: false

  # Example 3: run_task operation - Execute fabric task from external file
  # Loads and executes a specific task from a fabric tasks file
  task_execution_example:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_task
          inputs:
            tasks_file: "path/to/tasks.py"  # Path to fabric tasks file
            task_name: "my_task_name"  # Name of task function in tasks.py
            task_properties:  # Optional: properties passed to task
              param1: "value1"
              param2: "value2"
            fabric_env:
              host_string: { get_input: host_ip }
              user: { get_input: ssh_user }
              key: { get_secret: ssh_private_key }
              port: 22
            proxy_settings:
              disable: false
            # NOTE: hide_output is NOT supported for run_task operation

  # Example 4: run_module_task operation - Execute task from module mapping
  # Executes a task specified by module.task_name mapping
  module_task_execution_example:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_module_task
          inputs:
            task_mapping: "my_module.my_task"  # Format: module_name.task_name
            task_properties:  # Optional: properties passed to task
              param1: "value1"
              param2: "value2"
            fabric_env:
              host_string: { get_input: host_ip }
              user: { get_input: ssh_user }
              key: { get_secret: ssh_private_key }
              port: 22
            proxy_settings:
              disable: false
            # NOTE: hide_output is NOT supported for run_module_task operation

  # Example 5: Advanced run_script with process configuration
  # Shows all available process options and their effects
  advanced_script_example:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            script_path: scripts/advanced_script.py
            fabric_env:
              host_string: { get_input: host_ip }
              user: { get_input: ssh_user }
              key: { get_secret: ssh_private_key }
              port: 22
              # Advanced fabric options
              connect_timeout: 30
              command_timeout: 300
              always_use_pty: false
              warn_only: false
            process:
              # Environment variables for script execution
              env:
                PYTHONPATH: "/opt/myapp/lib"
                APP_CONFIG: "/etc/myapp/config.yaml"
              # Override default temporary directory behavior
              # base_dir: /opt/myapp/temp  # Custom base directory
              # base_dir: .  # Use current directory (usually home dir)
              # Custom working directory for script execution
              cwd: /opt/myapp
              # Arguments passed to script
              args: ["--config", "/etc/myapp/config.yaml", "--verbose"]
              # Command prefix (e.g., interpreter)
              command_prefix: "python3"
              # Custom proxy server port for ctx operations
              ctx_server_port: 12345
            use_sudo: false  # Set to true for sudo execution
            proxy_settings:
              disable: false
              auto_resolve: true
            hide_output: ["stderr"]  # Hide stderr, show stdout

  # Example 6: Error handling and retry configuration
  # Shows how to handle non-recoverable errors with specific exit codes
  error_handling_example:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            commands:
              - "python /opt/myapp/check_status.py"
            fabric_env:
              host_string: { get_input: host_ip }
              user: { get_input: ssh_user }
              key: { get_secret: ssh_private_key }
              port: 22
            # Non-recoverable error exit codes - if command returns these codes,
            # the operation will fail with NonRecoverableError instead of regular error
            non_recoverable_error_exit_codes: [2, 3, 127]

# IMPORTANT NOTES:
# 1. All operations are resumable by default (@operation(resumable=True))
# 2. All operations use @handle_fabric_exception for consistent error handling
# 3. fabric_env.host_string can be IP address or hostname
# 4. Authentication methods: key, key_filename, password, or key_filename from agent
# 5. proxy_settings control proxy behavior for network-restricted environments
# 6. shell_env in fabric_env applies to all commands in run_commands
# 7. process.env in run_script applies only to that specific script
# 8. Temporary directories (nativeedge-ctx) are NOT cleaned up automatically
# 9. base_dir overrides temporary directory behavior when specified
# 10. use_sudo requires appropriate sudo configuration on remote host

blueprint_labels:
  obj-type:
    values:
      - fabric

labels:
  obj-type:
    values:
      - fabric
