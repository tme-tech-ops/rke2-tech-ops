inputs:

### First Control Plane Details ###

  cp_1_vm_name:
    type: string
    hidden: false
    display_label: CP1 VM Name
    description: |
      Name of the first control-plane Virtual Machine
    default: rke2-cp-01
    display:
      group: first_control_plane
      index: 0

  cp_1_hostname:
    type: string
    hidden: false
    allow_update: false
    display_label: CP1 Hostname
    description: |
      Hostname of the first control-plane Virtual Machine.
      Cannot contain characters other than:
      letters (a-z, A-Z), numbers (0-9), or hyphens (-).
      Can be up to 63 characters long.
    constraints:
      - pattern: ^(?!-)[a-zA-Z0-9-]{1,63}(?<!-)$
        error_message: |
          Must be letters (a-z, A-Z), numbers (0-9), or hyphens (-).
          No more than 64 characters.
      - max_length: 64
        error_message: Hostname must be 64 characters or less.
    default: rke2cp-01
    display:
      group: first_control_plane
      index: 1

  cp_1_vm_user_name:
    type: string
    hidden: false
    allow_update: false
    display_label: VM Username
    description: |
      Username to be used for all virtual machines.
      Cannot contain leading or trailing spaces.
    default: edgeuser
    constraints:
      - pattern: ^(?!\s)(?!.*\s$).*$
        error_message: Cannot contain leading or trailing spaces.
    display:
      group: first_control_plane
      index: 2

  cp_1_vm_password:
    type: secret_key
    hidden: false
    display_label: VM Password
    description: |
      Secret key containing the virtual machine username password in SHA-512.
      Used for all VMs in the cluster.
    constraints:
      - type: password
    display:
      group: first_control_plane
      index: 3

  cp_1_disk_wrapper:
    type: string
    hidden: false
    display_label: CP1 DataStore Path
    required: true
    allow_update: false
    description: >
      Deployment datastore path on target Endpoint. (i.e. /DataStore0)
    constraints:
      - valid_values:
          jmespath:
            - extra.hw_core.storage.dataStoreOrVolumes[?((((type=='SSD'||type=='HDD')&&name.contains(@,'DataStore'))||(shared&&name=='/Shared_DataStore'))&&status=='ONLINE')].mountPath
            - get_inventory:
                get_environment_capability: ece_service_tag
    display:
      group: first_control_plane
      index: 4

  cp_1_vnic_0_segment_name:
    type: string
    hidden: false
    allow_update: true
    required: true
    display_label: CP1 Virtual Network Segment for Primary Interface
    description: Name of the Virtual Network Segment.
    constraints:
      - valid_values:
          jmespath:
            - extra.hw_core.network.virtualSegment[?type=='NAT'||type=='BRIDGE'].name
            - get_inventory:
                get_environment_capability: ece_service_tag
    display:
      group: first_control_plane
      index: 5

  cp_1_use_dhcp:
    type: boolean
    hidden: false
    display_label: CP1 Use DHCP
    description: |
      If false, then static ip must be configured with optional DNS and Gateway.
    default: true
    constraints:
      - valid_values: [true, false]
        error_message: Must be true or false.
    display:
      group: first_control_plane
      index: 6

  cp_1_static_ip:
    type: string
    hidden: false
    exclusive_with: cp_1_use_dhcp
    display_label: CP1 Static IP in CIDR notation
    description: |
      Static IP Address in CIDR notation that will be assigned to the VM
      Example: 192.168.0.100/24
    constraints:
      - pattern: '^(?:((25[0-5]|2[0-4]\d|1\d\d|\d{1,2})(\.(25[0-5]|2[0-4]\d|1\d\d|\d{1,2})){3})\/(3[0-2]|[12]?\d)|)$'
        error_message: |
          Invalid format for IP Address in CIDR format.
          Example: 172.16.0.1/16
    required: false
    display:
      group: first_control_plane
      index: 7

  cp_1_use_gateway:
    type: boolean
    hidden: false
    exclusive_with: cp_1_use_dhcp
    display_label: CP1 Use Gateway
    description: |
      If false, Gateway will not be configured
    default: false
    constraints:
      - valid_values: [true, false]
        error_message: Must be true or false.
    display:
      group: first_control_plane
      index: 8

  cp_1_gateway:
    type: string
    hidden: false
    only_with: cp_1_use_gateway
    display_label: CP1 Gateway IP
    description: IP address of the default gateway.
    required: false
    constraints:
      - pattern: ^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}$|^$
        error_message: |
          Invalid format for IP Address.
          Example: 172.16.0.1
    display:
      group: first_control_plane
      index: 9

  cp_1_use_dns:
    type: boolean
    hidden: false
    exclusive_with: cp_1_use_dhcp
    display_label: CP1 Use DNS
    description: |
      If false, DNS will not be configured
    default: false
    constraints:
      - valid_values: [true, false]
        error_message: Must be true or false.
    display:
      group: first_control_plane
      index: 10

  cp_1_dns:
    type: list
    hidden: false
    only_with: cp_1_use_dns
    display_label: CP1 DNS Servers
    description: List of DNS servers to use.
    required: false
    default: []
    display:
      group: first_control_plane
      index: 11

  cp_1_add_disks:
    type: boolean
    hidden: false
    allow_update: false
    display_label: CP1 Add Disks
    description: |
      Check to add a list of additional disks
    default: false
    constraints:
      - valid_values: [true, false]
        error_message: Must be true or false.
    display:
      group: first_control_plane
      index: 12

  cp_1_additional_disks:
    type: list
    item_type: cp_1_additional_disks
    hidden: false
    allow_update: false
    only_with: cp_1_add_disks
    display_label: CP1 Additional Virtual Disks
    description: >
      List of additional virtual disks to be created.
    required: false
    default: []
    display:
      group: first_control_plane
      index: 13

  cp_1_add_nics:
    type: boolean
    hidden: false
    display_label: CP1 Add Network Interfaces
    description: |
      Check to add list of additional network interfaces
    default: false
    constraints:
      - valid_values: [true, false]
        error_message: Must be true or false.
    display:
      group: first_control_plane
      index: 14

  cp_1_vm_add_nics:
    type: list
    item_type: cp_1_vm_add_nics
    hidden: false
    allow_update: false
    only_with: cp_1_add_nics
    display_label: CP1 Additional Network Interfaces
    description: >
      List of additional NICs (up to 9) beyond the primary NIC.
      Each NIC requires a segment name and network configuration.
    required: false
    default: []
    display:
      group: first_control_plane
      index: 15

  cp_1_use_passthrough:
    type: boolean
    hidden: false
    display_label: CP1 Enable device passthrough
    description: |
      Check to define usb, serial, gpu, video, and pcie devices for VM passthrough
    default: false
    constraints:
      - valid_values: [true, false]
        error_message: Must be true or false.
    display:
      group: first_control_plane
      index: 16

  cp_1_usb_wrapper:
    type: list
    item_type: string
    hidden: false
    only_with: cp_1_use_passthrough
    allow_update: false
    display_label: CP1 USB Device list
    description: >
      A list of USB logical names (string). USB-1 to USB-10 for Passthrough.
    required: false
    constraints:
      - valid_values:
          jmespath:
            - extra.hw_core.usbDevice[*].logicalName
            - get_inventory:
                get_environment_capability: ece_service_tag
    default: []
    display:
      group: first_control_plane
      index: 17

  cp_1_gpu_wrapper:
    type: list
    item_type: string
    hidden: false
    only_with: cp_1_use_passthrough
    display_label: CP1 GPU Passthrough
    description: >
      GPU passthrough. A list of GPU logical names (string).
    required: false
    constraints:
      - valid_values:
          jmespath:
            - "extra.hw_core.pciDevice[?deviceType=='GPU'].logicalName"
            - get_inventory:
                get_environment_capability: ece_service_tag
    default: []
    display:
      group: first_control_plane
      index: 18

  cp_1_pcie_wrapper:
    type: list
    item_type: string
    display_label: CP1 PCIe Passthrough
    hidden: false
    only_with: cp_1_use_passthrough
    description: >
      PCIe passthrough. A list of PCIe logical names.
    required: false
    constraints:
      - valid_values:
          jmespath:
            - extra.hw_core.pciDevice[*].logicalName
            - get_inventory:
                get_environment_capability: ece_service_tag
    default: []
    display:
      group: first_control_plane
      index: 19

  cp_1_video:
    type: list
    item_type: string
    hidden: false
    only_with: cp_1_use_passthrough
    display_label: CP1 Video Passthrough
    description: >
      Video passthrough. A list of Video logical names (string). E.g. 'Onboard Controller'
    required: false
    constraints:
      - valid_values:
          - "onboard controller"
    default: []
    display:
      group: first_control_plane
      index: 20

  cp_1_serial_port_wrapper:
    type: list
    item_type: string
    hidden: false
    only_with: cp_1_use_passthrough
    allow_update: false
    display_label: CP1 Serial Port
    description: |
      Serial port passthrough. PORT_MODE format (e.g. COM-1_RS-232)
    required: false
    default: []
    constraints:
      - valid_values:
          jmespath:
            - '[extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-232`}[*].values(@).join(`_`,@)[],extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-422`}[*].values(@).join(`_`,@)[],extra.hw_core.serialPorts[*].{"port":logicalName,"mode":`RS-485`}[*].values(@).join(`_`,@)[]][]'
            - get_inventory:
                get_environment_capability: ece_service_tag
    display:
      group: first_control_plane
      index: 21

### Hidden Inputs ###

# Hidden CP1 derivations
  cp_1_usb:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: CP1 USB Device list
    description: USB passthrough devices for CP1.
    required: false
    default: { get_input: cp_1_usb_wrapper }

  cp_1_gpu:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: CP1 GPU Passthrough
    description: GPU passthrough devices for CP1.
    required: false
    default: { get_input: cp_1_gpu_wrapper }

  cp_1_pcie:
    type: list
    item_type: string
    display_label: CP1 PCIe Passthrough
    hidden: true
    allow_update: false
    description: PCIe passthrough devices for CP1.
    required: false
    default: { get_input: cp_1_pcie_wrapper }

  cp_1_segment_name:
    type: string
    hidden: true
    allow_update: false
    required: true
    display_label: CP1 Virtual Network Segment
    description: Primary NIC segment name for CP1.
    default: { get_input: cp_1_vnic_0_segment_name }

  cp_1_disk:
    type: string
    display_label: CP1 Endpoint Datastore Path
    allow_update: false
    hidden: true
    required: true
    description: Datastore path for CP1.
    default: { get_input: cp_1_disk_wrapper }

  cp_1_serial_port:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: CP1 Serial Port
    description: Serial port passthrough for CP1.
    required: false
    default: { get_input: cp_1_serial_port_wrapper }

# Hidden system inputs
  enable_management:
    type: boolean
    hidden: true
    allow_update: false
    display_label: Enable Management
    description: |
      Enable management which will create a tap interface for
      the infrastructure segment.
    default: true

  cloudinit:
    type: string
    hidden: true
    allow_update: false
    display_label: Cloud Init Config
    description: Cloud init override config.
    required: false
    default: ''

  iso_files:
    type: list
    item_type: string
    hidden: true
    allow_update: false
    display_label: ISO Files
    description: List ISO files for VM provisioning.
    required: false
    default: []

  boot_order:
    type: list
    item_type: string
    required: false
    hidden: true
    allow_update: false
    display_label: Boot Order
    description: Boot order of the Virtual Machine.
    default: []

# Data types

data_types:

  port_forward_rules:
    properties:
      host_ip:
        type: string
        default: CHANGE TO HOST IP OF NAT VIRTUAL NETWORK SEGMENT
        required: false
        description: Endpoint Host network IP where the NAT VNS resides
      host_port:
        type: string
        required: false
        description: Host tcp/udp port to advertise on
      protocol:
        type: string
        required: false
        description: Protocol ("TCP", "UDP")
        constraints:
          - valid_values: [ TCP, UDP ]
      service_type:
        type: string
        required: false
        description: Service Type ("SSH", "HTTP", "CUSTOM")
        constraints:
          - valid_values: [ SSH, HTTP, CUSTOM ]
      vm_port:
        type: string
        required: false
        description: VM tcp/udp Port to forward
      vm_ip:
        type: string
        required: false
        description: VM IP, only needed when static IP is defined for the VM

  cp_1_vm_add_nics:
    properties:
      nic_name:
        type: string
        required: true
        default: 'nic2'
        description: >
          A unique label for this NIC entry (e.g. "NIC 2").
        display:
          index: 1
          display_name: NIC Label
      segment_name:
        type: string
        required: true
        default: ''
        description: >
          Name of the Virtual Network Segment to attach this NIC to.
        display:
          index: 2
          display_name: Segment Name
      use_dhcp:
        type: boolean
        required: true
        default: true
        description: Use DHCP for this NIC. If false, static_ip is required.
        display:
          index: 3
          display_name: Use DHCP
      accept_dhcp_routes:
        type: boolean
        required: false
        default: false
        description: >
          When DHCP is enabled, accept gateway and routes from the DHCP server.
        display:
          index: 4
          display_name: Accept DHCP Routes
      static_ip:
        type: string
        required: false
        default: ''
        description: >
          Static IP Address and CIDR prefix (e.g. 192.168.0.100/24).
        display:
          index: 5
          display_name: Static IP/CIDR
      use_gateway:
        type: boolean
        required: false
        default: false
        description: >
          Configure a static route for this NIC.
        display:
          index: 6
          display_name: Use Gateway
      gateway:
        type: string
        required: false
        default: ''
        description: Gateway IP address (e.g. 192.168.0.1).
        display:
          index: 7
          display_name: Gateway IP
      route_destination:
        type: string
        required: false
        default: ''
        description: >
          Destination subnet in CIDR for static route (e.g. 10.20.0.0/16).
        display:
          index: 8
          display_name: Route Destination (CIDR)
      use_dns:
        type: boolean
        required: false
        default: false
        description: Configure DNS servers for this NIC.
        display:
          index: 9
          display_name: Use DNS
      dns:
        type: string
        required: false
        default: ''
        description: >
          Comma-separated list of DNS server IPs (e.g. 8.8.8.8,8.8.4.4).
        display:
          index: 10
          display_name: DNS Servers

  cp_1_additional_disks:
    properties:
      name:
        type: string
        required: true
        default: 'vdisk2'
        description: Unique name to identify the virtual disk.
        display:
          index: 1
          display_name: Name
      disk:
        type: string
        required: true
        default: '/DataStore0'
        description: The /DataStore path where the virtual disk will be created.
        display:
          index: 2
          display_name: Disk Path
      storage:
        type: integer
        required: true
        default: 16
        description: The size of the virtual disk, specified as an integer value.
        display:
          index: 3
          display_name: Storage Size
      storage_unit:
        type: string
        required: true
        default: 'GB'
        description: The unit of measurement for the disk size.
        display:
          index: 4
          display_name: Storage Unit
        constraints:
          - valid_values: [ KB, MB, GB, TB, PB, EB, ZB, YB ]