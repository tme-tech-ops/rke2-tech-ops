            ag_6_gpu_wrapper: { get_input: ag_6_gpu_wrapper }
            ag_6_pcie_wrapper: { get_input: ag_6_pcie_wrapper }
            ag_6_video: { get_input: ag_6_video }
            ag_6_serial_port_wrapper: { get_input: ag_6_serial_port_wrapper }
    relationships:
      - type: dell.relationships.depends_on
        target: prep_config
      - type: dell.relationships.depends_on
        target: ssh_keys

  add_ag_vm:
    type: dell.nodes.ServiceComponent
    properties:
      resource_config:
        blueprint:
          external_resource: true
          id: { get_input: utility_blueprint_id }
        deployment:
          display_name: { concat: ["utility-vm-", get_attribute: [add_ag_prep_config, vm_name]] }
          inputs:
            service_tag: { get_attribute: [add_ag_prep_config, ece_service_tag] }
            name: { get_attribute: [add_ag_prep_config, vm_name] }
            image: { get_attribute: [binary_image, binary_details, extra, artifact_id] }
            os_type: { get_input: os_type }
            cpu: { get_attribute: [add_ag_prep_config, vcpus] }
            memory: { get_attribute: [add_ag_prep_config, memory_size] }
            storage: { get_attribute: [add_ag_prep_config, os_disk_size] }
            disk: { get_attribute: [add_ag_prep_config, disk] }
            disk_controller: { get_attribute: [add_ag_prep_config, disk_controller] }
            hardware_options.vTPM: { get_input: ag_hardware_options.vTPM }
            hardware_options.secure_boot: { get_input: ag_hardware_options.secure_boot }
            hardware_options.firmware_type: { get_input: ag_hardware_options.firmware_type }
            enable_management: { get_input: enable_management }
            network_settings: { get_attribute: [add_ag_prep_config, network_settings] }
            cloudinit: { get_attribute: [add_ag_prep_config, cloudinit_config] }
            vm_user_name: { get_input: cp_1_vm_user_name }
            ssh_private_key_secret:
              concat:
                - get_attribute: [ssh_keys, secret_key_name]
                - "_private"
            vm_hostname: { get_attribute: [add_ag_prep_config, vm_hostname] }
            additional_disks: { get_attribute: [add_ag_prep_config, additional_disks] }
            usb: { get_attribute: [add_ag_prep_config, usb] }
            serial_port: { get_attribute: [add_ag_prep_config, serial_port] }
            gpu: { get_attribute: [add_ag_prep_config, gpu] }
            video: { get_attribute: [add_ag_prep_config, video] }
            pcie: { get_attribute: [add_ag_prep_config, pcie] }
    relationships:
      - type: dell.relationships.depends_on
        target: add_ag_prep_config
      - type: dell.relationships.depends_on
        target: binary_image
      - type: dell.relationships.depends_on
        target: ssh_keys

  ag_env_precheck:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *ag_env_precheck_inputs
        update:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *ag_env_precheck_inputs
    relationships:
       - type: dell.relationships.depends_on
         target: add_ag_vm
       - type: dell.relationships.depends_on
         target: env_postcheck

  install_ag:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          executor: central_deployment_agent
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            hide_output: { get_input: hide_log_output }
            proxy_settings:
              auto_resolve: false
              enable_socks5: false
              target_id: { get_attribute: [add_ag_vm, capabilities, proxy_target_id] }
              target_ip: { get_attribute: [add_ag_vm, capabilities, vm_name_id] }
            commands: *ag_run_install_cmds
            fabric_env:
              <<: *ag_command_fabric_env
        update:
          executor: central_deployment_agent
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            hide_output: { get_input: hide_log_output }
            proxy_settings:
              auto_resolve: false
              enable_socks5: false
              target_id: { get_attribute: [add_ag_vm, capabilities, proxy_target_id] }
              target_ip: { get_attribute: [add_ag_vm, capabilities, vm_name_id] }
            commands: *ag_run_install_cmds
            fabric_env:
              <<: *ag_command_fabric_env
        stop:
          executor: central_deployment_agent
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            hide_output: { get_input: hide_log_output }
            proxy_settings:
              auto_resolve: false
              enable_socks5: false
              target_id: { get_attribute: [add_ag_vm, capabilities, proxy_target_id] }
              target_ip: { get_attribute: [add_ag_vm, capabilities, vm_name_id] }
            commands: *ag_run_uninstall_cmds
            fabric_env:
              <<: *ag_command_fabric_env
    relationships:
       - type: dell.relationships.depends_on
         target: ag_env_precheck

  ag_env_postcheck:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *ag_env_postcheck_inputs
        update:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *ag_env_postcheck_inputs
    relationships:
       - type: dell.relationships.depends_on
         target: install_ag

  cluster_results:
    type: dell.nodes.ApplicationModule
    interfaces:
      dell.interfaces.lifecycle:
        start:
          implementation: multi-node/scripts/collect_cluster_results.py
          executor: central_deployment_agent
    relationships:
      - type: dell.relationships.depends_on
        target: env_postcheck
      - type: dell.relationships.depends_on
        target: cp_env_postcheck
      - type: dell.relationships.depends_on
        target: ag_env_postcheck

groups:
  add_cp_vm_group:
    members:
      - add_cp_prep_config
      - add_cp_vm
      - cp_env_precheck
      - install_cp
      - cp_env_postcheck
  add_ag_vm_group:
    members:
      - add_ag_prep_config
      - add_ag_vm
      - ag_env_precheck
      - install_ag
      - ag_env_postcheck

policies:
  add_cp_vm_scaling:
    type: dell.policies.scaling
    properties:
      default_instances: { jmespath: ['sum([`-1`, @])', { get_input: number_of_control_plane }] }
    targets: [add_cp_vm_group]
  add_ag_vm_scaling:
    type: dell.policies.scaling
    properties:
      default_instances: { get_input: number_of_agent_nodes }
    targets: [add_ag_vm_group]
