dsl_definitions:

  scale_shell_env: &scale_shell_env
    RKE2_VERSION: { get_input: rke2_version }
    CNI_TYPE: { get_input: cni_type }
    ENABLE_CIS: { get_input: enable_cis }
    CLUSTER_CIDR: { get_input: cluster_cidr }
    SERVICE_CIDR: { get_input: service_cidr }
    MAX_PODS: { get_input: max_pods }
    INSTALL_INGRESS: { get_input: install_ingress }
    INSTALL_SERVICELB: { get_input: install_servicelb }
    INSTALL_LOCAL_PATH_PROVISIONER: { get_input: install_local_path_provisioner }
    LOCAL_PATH_PROVISIONER_VERSION: { get_input: local_path_provisioner_version }
    INSTALL_DNS_UTILITY: { get_input: install_dns_utility }
    RKE2_DATA: { get_input: rke2_data }
    KUBELET_DATA: { get_input: kubelet_data }
    PVC_DATA: { get_input: pvc_data }
    CONTROL_PLANE_TAINT: { get_input: control_plane_taint }
    DEBUG: { get_input: debug }

# CP Scaling Group - Join as server
  cp_env_precheck_inputs: &cp_env_precheck_inputs
    script_path: multi-node/vm/scripts/cp_env_precheck.sh
    process:
      env:
        OFFLINE_MODE: { get_input: offline_mode }
        OFFLINE_BINARY_URL: { get_input: offline_binary_url }
        OFFLINE_BINARY_USER: { get_input: offline_binary_access_user }
        OFFLINE_BINARY_PASSWORD: { get_secret: { get_input: offline_binary_access_token } }
        SCRIPT_URL: { get_input: script_url }
        TLS_SAN: { get_input: tls_san }
        REG_URL: { get_input: registry_url }
        REG_USER: { get_input: registry_access_user }
        REG_PASS: { concat: [ '"', { get_input: registry_password }, '"' ] }
        JOIN_SERVER: { get_attribute: [env_postcheck, capabilities, mgmt_ip] }
        JOIN_TOKEN: { get_attribute: [env_postcheck, capabilities, rke2_join_token] }
    fabric_env:
      host_string: { get_attribute: [add_cp_vm, capabilities, vm_name_id] }
      user: { get_input: cp_1_vm_user_name }
      key: { get_secret: { get_attribute: [add_cp_vm, capabilities, vm_ssh_private_key] } }
      port: 22
    hide_output: { get_input: hide_log_output }
    proxy_settings:
      auto_resolve: false
      enable_socks5: false
      target_id: { get_attribute: [add_cp_vm, capabilities, proxy_target_id] }
      target_ip: { get_attribute: [add_cp_vm, capabilities, vm_name_id] }

  cp_env_postcheck_inputs: &cp_env_postcheck_inputs
    script_path: multi-node/vm/scripts/cp_env_postcheck.sh
    fabric_env:
      host_string: { get_attribute: [add_cp_vm, capabilities, vm_name_id] }
      user: { get_input: cp_1_vm_user_name }
      key: { get_secret: { get_attribute: [add_cp_vm, capabilities, vm_ssh_private_key] } }
      port: 22
    hide_output: { get_input: hide_log_output }
    proxy_settings:
      auto_resolve: false
      enable_socks5: false
      target_id: { get_attribute: [add_cp_vm, capabilities, proxy_target_id] }
      target_ip: { get_attribute: [add_cp_vm, capabilities, vm_name_id] }

  cp_run_install_cmds: &cp_run_install_cmds
    - concat: [ "sudo -E ./rke2_installer.sh ", { get_attribute: [ cp_env_precheck, capabilities, install_cmd ] } ]
  cp_run_uninstall_cmds: &cp_run_uninstall_cmds
    - "sudo -E ./rke2_installer.sh uninstall"

  cp_command_fabric_env: &cp_command_fabric_env
    shell_env:
      <<: *scale_shell_env
    host_string: { get_attribute: [add_cp_vm, capabilities, vm_name_id] }
    user: { get_input: cp_1_vm_user_name }
    key: { get_secret: { get_attribute: [add_cp_vm, capabilities, vm_ssh_private_key] } }
    port: 22

# AG Scaling Group - Join as agent
  ag_env_precheck_inputs: &ag_env_precheck_inputs
    script_path: multi-node/vm/scripts/ag_env_precheck.sh
    process:
      env:
        OFFLINE_MODE: { get_input: offline_mode }
        OFFLINE_BINARY_URL: { get_input: offline_binary_url }
        OFFLINE_BINARY_USER: { get_input: offline_binary_access_user }
        OFFLINE_BINARY_PASSWORD: { get_secret: { get_input: offline_binary_access_token } }
        SCRIPT_URL: { get_input: script_url }
        REG_URL: { get_input: registry_url }
        REG_USER: { get_input: registry_access_user }
        REG_PASS: { concat: [ '"', { get_input: registry_password }, '"' ] }
        JOIN_SERVER: { get_attribute: [env_postcheck, capabilities, mgmt_ip] }
        JOIN_TOKEN: { get_attribute: [env_postcheck, capabilities, rke2_join_token] }
    fabric_env:
      host_string: { get_attribute: [add_ag_vm, capabilities, vm_name_id] }
      user: { get_input: cp_1_vm_user_name }
      key: { get_secret: { get_attribute: [add_ag_vm, capabilities, vm_ssh_private_key] } }
      port: 22
    hide_output: { get_input: hide_log_output }
    proxy_settings:
      auto_resolve: false
      enable_socks5: false
      target_id: { get_attribute: [add_ag_vm, capabilities, proxy_target_id] }
      target_ip: { get_attribute: [add_ag_vm, capabilities, vm_name_id] }

  ag_env_postcheck_inputs: &ag_env_postcheck_inputs
    script_path: multi-node/vm/scripts/ag_env_postcheck.sh
    fabric_env:
      host_string: { get_attribute: [add_ag_vm, capabilities, vm_name_id] }
      user: { get_input: cp_1_vm_user_name }
      key: { get_secret: { get_attribute: [add_ag_vm, capabilities, vm_ssh_private_key] } }
      port: 22
    hide_output: { get_input: hide_log_output }
    proxy_settings:
      auto_resolve: false
      enable_socks5: false
      target_id: { get_attribute: [add_ag_vm, capabilities, proxy_target_id] }
      target_ip: { get_attribute: [add_ag_vm, capabilities, vm_name_id] }

  ag_run_install_cmds: &ag_run_install_cmds
    - concat: [ "sudo -E ./rke2_installer.sh ", { get_attribute: [ ag_env_precheck, capabilities, install_cmd ] } ]
  ag_run_uninstall_cmds: &ag_run_uninstall_cmds
    - "sudo -E ./rke2_installer.sh uninstall"

  ag_command_fabric_env: &ag_command_fabric_env
    shell_env:
      <<: *scale_shell_env
    host_string: { get_attribute: [add_ag_vm, capabilities, vm_name_id] }
    user: { get_input: cp_1_vm_user_name }
    key: { get_secret: { get_attribute: [add_ag_vm, capabilities, vm_ssh_private_key] } }
    port: 22

node_templates:

  add_cp_prep_config:
    type: dell.nodes.ApplicationModule
    interfaces:
      dell.interfaces.lifecycle:
        precreate:
          implementation: multi-node/vm/scripts/cp_prep_vm.py
          executor: central_deployment_agent
          inputs:
            cp_1_vm_user_name: { get_input: cp_1_vm_user_name }
            hashed_vm_passwd: { get_attribute: [prep_config, hashed_vm_passwd] }
            ssh_public_key:
              get_secret:
                concat:
                  - get_attribute: [ssh_keys, secret_key_name]
                  - "_public"
            cp_vcpus: { get_input: cp_vcpus }
            cp_memory_size: { get_input: cp_memory_size }
            cp_os_disk_size: { get_input: cp_os_disk_size }
            cp_disk_controller: { get_input: cp_disk_controller }
            # CP 2
            cp_2_deployment_id: { get_input: cp_2_deployment_id }
            cp_2_name: { get_input: cp_2_name }
            cp_2_hostname: { get_input: cp_2_hostname }
            cp_2_disk_wrapper: { get_input: cp_2_disk_wrapper }
            cp_2_vnic_0_segment_name: { get_input: cp_2_vnic_0_segment_name }
            cp_2_use_dhcp: { get_input: cp_2_use_dhcp }
            cp_2_static_ip: { get_input: cp_2_static_ip }
            cp_2_use_gateway: { get_input: cp_2_use_gateway }
            cp_2_gateway: { get_input: cp_2_gateway }
            cp_2_use_dns: { get_input: cp_2_use_dns }
            cp_2_dns: { get_input: cp_2_dns }
            cp_2_vm_add_nics: { get_input: cp_2_vm_add_nics }
            cp_2_additional_disks: { get_input: cp_2_additional_disks }
            cp_2_usb_wrapper: { get_input: cp_2_usb_wrapper }
            cp_2_gpu_wrapper: { get_input: cp_2_gpu_wrapper }
            cp_2_pcie_wrapper: { get_input: cp_2_pcie_wrapper }
            cp_2_video: { get_input: cp_2_video }
            cp_2_serial_port_wrapper: { get_input: cp_2_serial_port_wrapper }
            # CP 3
            cp_3_deployment_id: { get_input: cp_3_deployment_id }
            cp_3_name: { get_input: cp_3_name }
            cp_3_hostname: { get_input: cp_3_hostname }
            cp_3_disk_wrapper: { get_input: cp_3_disk_wrapper }
            cp_3_vnic_0_segment_name: { get_input: cp_3_vnic_0_segment_name }
            cp_3_use_dhcp: { get_input: cp_3_use_dhcp }
            cp_3_static_ip: { get_input: cp_3_static_ip }
            cp_3_use_gateway: { get_input: cp_3_use_gateway }
            cp_3_gateway: { get_input: cp_3_gateway }
            cp_3_use_dns: { get_input: cp_3_use_dns }
            cp_3_dns: { get_input: cp_3_dns }
            cp_3_vm_add_nics: { get_input: cp_3_vm_add_nics }
            cp_3_additional_disks: { get_input: cp_3_additional_disks }
            cp_3_usb_wrapper: { get_input: cp_3_usb_wrapper }
            cp_3_gpu_wrapper: { get_input: cp_3_gpu_wrapper }
            cp_3_pcie_wrapper: { get_input: cp_3_pcie_wrapper }
            cp_3_video: { get_input: cp_3_video }
            cp_3_serial_port_wrapper: { get_input: cp_3_serial_port_wrapper }
    relationships:
      - type: dell.relationships.depends_on
        target: prep_config
      - type: dell.relationships.depends_on
        target: ssh_keys

  add_cp_vm:
    type: dell.nodes.ServiceComponent
    properties:
      resource_config:
        blueprint:
          external_resource: true
          id: { get_input: utility_blueprint_id }
        deployment:
          display_name: { concat: ["utility-vm-", get_attribute: [add_cp_prep_config, vm_name]] }
          inputs:
            service_tag: { get_attribute: [add_cp_prep_config, ece_service_tag] }
            name: { get_attribute: [add_cp_prep_config, vm_name] }
            image: { get_attribute: [binary_image, binary_details, extra, artifact_id] }
            os_type: { get_input: os_type }
            cpu: { get_attribute: [add_cp_prep_config, vcpus] }
            memory: { get_attribute: [add_cp_prep_config, memory_size] }
            storage: { get_attribute: [add_cp_prep_config, os_disk_size] }
            disk: { get_attribute: [add_cp_prep_config, disk] }
            disk_controller: { get_attribute: [add_cp_prep_config, disk_controller] }
            hardware_options.vTPM: { get_input: hardware_options.vTPM }
            hardware_options.secure_boot: { get_input: hardware_options.secure_boot }
            hardware_options.firmware_type: { get_input: hardware_options.firmware_type }
            enable_management: { get_input: enable_management }
            network_settings: { get_attribute: [add_cp_prep_config, network_settings] }
            cloudinit: { get_attribute: [add_cp_prep_config, cloudinit_config] }
            vm_user_name: { get_input: cp_1_vm_user_name }
            ssh_private_key_secret:
              concat:
                - get_attribute: [ssh_keys, secret_key_name]
                - "_private"
            vm_hostname: { get_attribute: [add_cp_prep_config, vm_hostname] }
            additional_disks: { get_attribute: [add_cp_prep_config, additional_disks] }
            usb: { get_attribute: [add_cp_prep_config, usb] }
            serial_port: { get_attribute: [add_cp_prep_config, serial_port] }
            gpu: { get_attribute: [add_cp_prep_config, gpu] }
            video: { get_attribute: [add_cp_prep_config, video] }
            pcie: { get_attribute: [add_cp_prep_config, pcie] }
    relationships:
      - type: dell.relationships.depends_on
        target: add_cp_prep_config
      - type: dell.relationships.depends_on
        target: binary_image
      - type: dell.relationships.depends_on
        target: ssh_keys

  cp_env_precheck:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *cp_env_precheck_inputs
        update:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *cp_env_precheck_inputs
    relationships:
       - type: dell.relationships.depends_on
         target: add_cp_vm
       - type: dell.relationships.depends_on
         target: env_postcheck

  install_cp:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          executor: central_deployment_agent
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            hide_output: { get_input: hide_log_output }
            proxy_settings:
              auto_resolve: false
              enable_socks5: false
              target_id: { get_attribute: [add_cp_vm, capabilities, proxy_target_id] }
              target_ip: { get_attribute: [add_cp_vm, capabilities, vm_name_id] }
            commands: *cp_run_install_cmds
            fabric_env:
              <<: *cp_command_fabric_env
        update:
          executor: central_deployment_agent
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            hide_output: { get_input: hide_log_output }
            proxy_settings:
              auto_resolve: false
              enable_socks5: false
              target_id: { get_attribute: [add_cp_vm, capabilities, proxy_target_id] }
              target_ip: { get_attribute: [add_cp_vm, capabilities, vm_name_id] }
            commands: *cp_run_install_cmds
            fabric_env:
              <<: *cp_command_fabric_env
        stop:
          executor: central_deployment_agent
          implementation: fabric.fabric_plugin.tasks.run_commands
          inputs:
            hide_output: { get_input: hide_log_output }
            proxy_settings:
              auto_resolve: false
              enable_socks5: false
              target_id: { get_attribute: [add_cp_vm, capabilities, proxy_target_id] }
              target_ip: { get_attribute: [add_cp_vm, capabilities, vm_name_id] }
            commands: *cp_run_uninstall_cmds
            fabric_env:
              <<: *cp_command_fabric_env
    relationships:
       - type: dell.relationships.depends_on
         target: cp_env_precheck

  cp_env_postcheck:
    type: dell.nodes.Root
    interfaces:
      dell.interfaces.lifecycle:
        create:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *cp_env_postcheck_inputs
        update:
          implementation: fabric.fabric_plugin.tasks.run_script
          inputs:
            <<: *cp_env_postcheck_inputs
    relationships:
       - type: dell.relationships.depends_on
         target: install_cp

  add_ag_prep_config:
